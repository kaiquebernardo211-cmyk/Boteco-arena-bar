<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO ARENA BAR</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ffcc00;
            margin: 20px 0;
        }
        .chops {
            font-size: 4rem;
            animation: bater 1s infinite alternate;
        }
        @keyframes bater {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
        .pix-box {
            margin-top: 30px; 
            background: #111; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #ffcc00;
        }
        .pix-titulo {
            margin: 0 0 10px 0; 
            font-size: 1.3rem; 
            color: #ffcc00;
            font-weight: bold;
        }
        #pix {
            margin: 10px 0; 
            font-size: 1.1rem; 
            word-break: break-all;
        }
        button {
            margin-top: 10px; 
            background: #ffcc00; 
            color: #000; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1rem;
        }
        button:active {
            transform: scale(0.95);
        }
        .endereco {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chops">🍻🍻</div>
        <h1>BOTECO ARENA BAR</h1>
        
        <div class="pix-box">
            <p class="pix-titulo">FAZ O PIX 🍻</p>
            <p id="pix">(55) 79 9957-8581</p>
            <button onclick="copiarPix()">COPIAR PIX</button>
            <p class="endereco">Salgado, Povoado Turma - SE</p>
        </div>
    </div>

    <script>
    function copiarPix() {
        const pix = document.getElementById('pix').innerText;
        navigator.clipboard.writeText(pix);
        alert('Chave PIX copiada! Valeu 🍻');
    }
    </script>
</body>
</html>
